<!DOCTYPE html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大理五日</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f7f4; --bg2: #ffffff; --bg3: #f0ede8;
      --text: #1a1a1a; --text2: #555550; --text3: #999990;
      --border: #e0ddd8;
      --accent-y: #d4f200; --accent-b: #00e5ff;
      --accent-y-dim: rgba(212,242,0,0.18); --accent-b-dim: rgba(0,229,255,0.13);
      --shadow: 0 2px 12px rgba(0,0,0,0.07); --shadow-card: 0 4px 24px rgba(0,0,0,0.09);
      --tab-active-bg: var(--text); --tab-active-text: var(--bg);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110; --bg2: #1c1c1a; --bg3: #242422;
        --text: #f0ede8; --text2: #aaa9a2; --text3: #666660;
        --border: #2e2e2a;
        --accent-y: #d4f200; --accent-b: #00e5ff;
        --accent-y-dim: rgba(212,242,0,0.10); --accent-b-dim: rgba(0,229,255,0.08);
        --shadow: 0 2px 12px rgba(0,0,0,0.35); --shadow-card: 0 4px 24px rgba(0,0,0,0.5);
        --tab-active-bg: var(--text); --tab-active-text: #111110;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-weight: 300; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 20px; }
    header { padding: 48px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .header-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
    .trip-title { font-family: 'Noto Serif SC', serif; font-size: clamp(2rem, 6vw, 3rem); font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; }
    .trip-title span { display: inline-block; background: var(--accent-y); color: #111; padding: 0 6px 2px; border-radius: 2px; }
    .trip-meta { text-align: right; flex-shrink: 0; }
    .trip-subtitle { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.8; }
    .tab-bar-wrap { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
    .tab-bar { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg2); cursor: pointer; transition: all 0.2s ease; font-family: 'DM Mono', monospace; }
    .tab-btn .tab-label { font-size: 0.68rem; color: var(--text3); letter-spacing: 0.06em; }
    .tab-btn .tab-day { font-size: 0.82rem; color: var(--text2); }
    .tab-btn:hover { border-color: var(--text3); transform: translateY(-1px); }
    .tab-btn.active { background: var(--tab-active-bg); border-color: var(--tab-active-bg); }
    .tab-btn.active .tab-label, .tab-btn.active .tab-day { color: var(--tab-active-text); }
    .day-panel { display: none; }
    .day-panel.active { display: block; }
    .day-heading { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .day-date { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text3); letter-spacing: 0.1em; }
    .day-title-text { font-family: 'Noto Serif SC', serif; font-size: 1.25rem; font-weight: 600; }
    .day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-y); flex-shrink: 0; }
    .category-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; box-shadow: var(--shadow); transition: box-shadow 0.2s; animation: fadeUp 0.35s ease both; }
    .category-card:hover { box-shadow: var(--shadow-card); }
    .category-card:nth-child(1) { animation-delay: 0.04s; }
    .category-card:nth-child(2) { animation-delay: 0.10s; }
    .category-card:nth-child(3) { animation-delay: 0.16s; }
    .category-card:nth-child(4) { animation-delay: 0.22s; }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
    .card-icon-wrap { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon-wrap.outfit, .card-icon-wrap.stay { background: var(--accent-y-dim); }
    .card-icon-wrap.food, .card-icon-wrap.transport { background: var(--accent-b-dim); }
    .card-icon-wrap svg { width: 15px; height: 15px; }
    .card-icon-wrap.outfit svg, .card-icon-wrap.stay svg { stroke: #7a8c00; }
    .card-icon-wrap.food svg, .card-icon-wrap.transport svg { stroke: #007a8c; }
    @media (prefers-color-scheme: dark) {
      .card-icon-wrap.outfit svg, .card-icon-wrap.stay svg { stroke: #b8d900; }
      .card-icon-wrap.food svg, .card-icon-wrap.transport svg { stroke: #00c8e0; }
    }
    .card-label { font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
    .card-body { padding: 16px 18px; display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; }
    .card-body.no-photos { grid-template-columns: 1fr; }
    .card-text { font-size: 0.9rem; line-height: 1.8; color: var(--text2); }
    .photo-stack { position: relative; width: 120px; height: 160px; flex-shrink: 0; cursor: pointer; }
    .photo-stack-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 7px; border: 2px solid var(--bg); transition: opacity 0.35s ease; opacity: 0; box-shadow: var(--shadow); }
    .photo-stack-img.visible { opacity: 1; }
    .photo-stack::before, .photo-stack::after { content: ''; position: absolute; inset: 0; border-radius: 7px; border: 2px solid var(--border); pointer-events: none; }
    .photo-stack::before { transform: rotate(-3deg) translate(-2px, 2px); background: var(--bg3); z-index: -1; }
    .photo-stack::after  { transform: rotate(2deg) translate(2px, 2px);  background: var(--bg3); z-index: -2; }
    .photo-count { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.45); color: #fff; font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; pointer-events: none; }
    .photo-tap-hint { position: absolute; top: 5px; left: 5px; background: var(--accent-b); color: #111; font-family: 'DM Mono', monospace; font-size: 0.55rem; padding: 1px 5px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    .photo-stack:hover .photo-tap-hint { opacity: 1; }
    .photo-placeholder { width: 120px; height: 160px; border-radius: 7px; background: var(--bg3); border: 1.5px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0; }
    .photo-placeholder svg { width: 18px; height: 18px; stroke: var(--text3); }
    .photo-placeholder span { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--text3); }
    footer { padding: 48px 0 36px; text-align: center; border-top: 1px solid var(--border); margin-top: 24px; }
    .footer-mark { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--text3); letter-spacing: 0.1em; }
    .footer-dot { width: 5px; height: 5px; background: var(--accent-y); border-radius: 50%; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 500px) {
      header { padding: 32px 0 24px; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .trip-meta { text-align: left; }
      .card-body { grid-template-columns: 1fr; }
      .photo-stack, .photo-placeholder { width: 100%; height: auto; aspect-ratio: 3 / 4; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <h1 class="trip-title"><span>大理</span>五日</h1>
      <div class="trip-meta">
        <div class="trip-subtitle">2026 · 3月<br>2026.03.09 — 2026.03.13</div>
      </div>
    </div>
  </header>
  <div class="tab-bar-wrap">
    <div class="container" style="padding:0 20px">
      <div class="tab-bar" id="tabBar"></div>
    </div>
  </div>
  <div id="dayPanels"></div>
  <footer>
    <div class="footer-mark">
      <span class="footer-dot"></span>
      <span>大理 · 五日记</span>
      <span class="footer-dot"></span>
    </div>
  </footer>
</div>

<!-- Lucide 放在 body 底部确保最后加载 -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>

<script>
// ============================================================
// 数据区 — 修改文字和照片路径在这里
// ============================================================
var days = [
  {
    id: 1, label: "Day 1", date: "03.09", title: "落地大理",
    categories: [
      { type: "outfit",    icon: "Shirt",           label: "穿搭", text: "预报说大理气温比北京高很多，为了节省行李空间，我只带了一件外套，早上出发时北京还是很冷，穿上羽绒服内胆之后好很多。", photos: ["day1_outfit_1.jpg","day1_outfit_2.jpg"] },
      { type: "food",      icon: "UtensilsCrossed", label: "饮食", text: "出机场先来了杯当地特色奶茶，超级好喝。怕吃吃喝喝太放纵，只吃了一顿下午的正餐，选的是当地人推荐的腊排骨，非常不错，还很便宜。", photos: ["day1_food_1.jpg","day1_food_2.jpg","day1_food_3.jpg"] },
      { type: "stay",      icon: "BedDouble",       label: "住宿", text: "住在洱海边的民宿，每天都能喝免费咖啡，还有浴缸，早饭也不错，就是位置不好找，只有自驾才方便。", photos: ["day1_stay_1.jpg","day1_stay_2.jpg"] },
      { type: "transport", icon: "MapPin",           label: "出行", text: "从机场取了车开始自驾，我开始很担心大理的交通，后来发现自己多虑了，比北京好多了。但中途开始下大雨，路况稍差了些，我走错了路，进了村里，太难开了，但还好最后顺利到达。", photos: ["day1_transport_1.jpg"] },
    ],
  },
  {
    id: 2, label: "Day 2", date: "03.10", title: "待填写",
    categories: [
      { type: "outfit",    icon: "Shirt",           label: "穿搭", text: "待填写。", photos: ["./photos/day2_outfit_1.jpg"] },
      { type: "food",      icon: "UtensilsCrossed", label: "饮食", text: "待填写。", photos: ["./photos/day2_food_1.jpg","./photos/day2_food_2.jpg"] },
      { type: "stay",      icon: "BedDouble",       label: "住宿", text: "待填写。", photos: [] },
      { type: "transport", icon: "MapPin",           label: "出行", text: "待填写。", photos: ["./photos/day2_transport_1.jpg"] },
    ],
  },
  {
    id: 3, label: "Day 3", date: "03.11", title: "待填写",
    categories: [
      { type: "outfit",    icon: "Shirt",           label: "穿搭", text: "待填写。", photos: ["./photos/day3_outfit_1.jpg"] },
      { type: "food",      icon: "UtensilsCrossed", label: "饮食", text: "待填写。", photos: ["./photos/day3_food_1.jpg","./photos/day3_food_2.jpg"] },
      { type: "stay",      icon: "BedDouble",       label: "住宿", text: "待填写。", photos: ["./photos/day3_stay_1.jpg"] },
      { type: "transport", icon: "MapPin",           label: "出行", text: "待填写。", photos: ["./photos/day3_transport_1.jpg"] },
    ],
  },
  {
    id: 4, label: "Day 4", date: "03.12", title: "待填写",
    categories: [
      { type: "outfit",    icon: "Shirt",           label: "穿搭", text: "待填写。", photos: ["./photos/day4_outfit_1.jpg"] },
      { type: "food",      icon: "UtensilsCrossed", label: "饮食", text: "待填写。", photos: ["./photos/day4_food_1.jpg"] },
      { type: "stay",      icon: "BedDouble",       label: "住宿", text: "待填写。", photos: ["./photos/day4_stay_1.jpg"] },
      { type: "transport", icon: "MapPin",           label: "出行", text: "待填写。", photos: ["./photos/day4_transport_1.jpg"] },
    ],
  },
  {
    id: 5, label: "Day 5", date: "03.13", title: "待填写",
    categories: [
      { type: "outfit",    icon: "Shirt",           label: "穿搭", text: "待填写。", photos: ["./photos/day5_outfit_1.jpg"] },
      { type: "food",      icon: "UtensilsCrossed", label: "饮食", text: "待填写。", photos: ["./photos/day5_food_1.jpg"] },
      { type: "stay",      icon: "BedDouble",       label: "住宿", text: "待填写。", photos: [] },
      { type: "transport", icon: "MapPin",           label: "出行", text: "待填写。", photos: ["./photos/day5_transport_1.jpg"] },
    ],
  },
];

// ============================================================
// 以下不需要改动
// ============================================================

// 用内联 SVG 替代 lucide.createElement（UMD 版不支持）
var ICONS = {
  Shirt: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/></svg>',
  UtensilsCrossed: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15zm0 0 7 7"/><path d="m2.1 21.8 6.4-6.3"/><path d="m19 5-7 7"/></svg>',
  BedDouble: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"/><path d="M12 10v4"/><path d="M2 18h20"/></svg>',
  MapPin: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
  Image: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>',
};

function makeIcon(name, size) {
  size = size || 15;
  var svg = ICONS[name];
  if (!svg) return '';
  return svg.replace('<svg ', '<svg width="' + size + '" height="' + size + '" stroke-width="1.8" ');
}

function renderPhotos(photos) {
  if (!photos || photos.length === 0) {
    return '<div class="photo-placeholder">' + makeIcon('Image', 18) + '<span>暂无照片</span></div>';
  }
  var imgs = photos.map(function(src, i) {
    return '<img class="photo-stack-img' + (i === 0 ? ' visible' : '') + '" src="' + src + '" alt="旅行照片" onerror="this.style.display=\'none\'" />';
  }).join('');
  var counter = photos.length > 1 ? '<span class="photo-count">1 / ' + photos.length + '</span><span class="photo-tap-hint">tap</span>' : '';
  return '<div class="photo-stack" data-photos=\'' + JSON.stringify(photos) + '\' data-current="0">' + imgs + counter + '</div>';
}

function bindPhotoStacks() {
  document.querySelectorAll('.photo-stack').forEach(function(stack) {
    var photos = JSON.parse(stack.dataset.photos || '[]');
    if (photos.length <= 1) return;
    stack.addEventListener('click', function() {
      var cur = parseInt(stack.dataset.current);
      var next = (cur + 1) % photos.length;
      var imgs = stack.querySelectorAll('.photo-stack-img');
      imgs[cur].classList.remove('visible');
      imgs[next].classList.add('visible');
      stack.dataset.current = next;
      var counter = stack.querySelector('.photo-count');
      if (counter) counter.textContent = (next + 1) + ' / ' + photos.length;
    });
  });
}

function switchDay(idx) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i) { b.classList.toggle('active', i === idx); });
  document.querySelectorAll('.day-panel').forEach(function(p, i) { p.classList.toggle('active', i === idx); });
  var panel = document.getElementById('panel-' + idx);
  panel.querySelectorAll('.category-card').forEach(function(card, i) {
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = '';
    card.style.animationDelay = (0.04 + i * 0.06) + 's';
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

var tabBar = document.getElementById('tabBar');
var panels = document.getElementById('dayPanels');

days.forEach(function(day, i) {
  var btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = '<span class="tab-label">' + day.date + '</span><span class="tab-day">' + day.label + '</span>';
  btn.addEventListener('click', function() { switchDay(i); });
  tabBar.appendChild(btn);

  var panel = document.createElement('div');
  panel.className = 'day-panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + i;

  var cards = day.categories.map(function(cat) {
    var hasPhotos = cat.photos && cat.photos.length > 0;
    return '<div class="category-card">'
      + '<div class="card-header"><div class="card-icon-wrap ' + cat.type + '">' + makeIcon(cat.icon) + '</div><span class="card-label">' + cat.label + '</span></div>'
      + '<div class="card-body' + (hasPhotos ? '' : ' no-photos') + '"><p class="card-text">' + cat.text + '</p>' + renderPhotos(cat.photos) + '</div>'
      + '</div>';
  }).join('');

  panel.innerHTML = '<div class="day-heading"><span class="day-date">' + day.date + '</span><span class="day-dot"></span><span class="day-title-text">' + day.title + '</span></div>' + cards;
  panels.appendChild(panel);
});

bindPhotoStacks();
</script>

</body>
</html>
